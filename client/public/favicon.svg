<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Minimalist Dice Background -->
  <rect x="10" y="10" width="80" height="80" rx="20" fill="#1e293b" />
  
  <!-- Subtle Gradient or Highlight -->
  <rect x="10" y="10" width="80" height="80" rx="20" fill="none" stroke="#3b82f6" stroke-width="4" />
  
  <!-- Dice Pips -->
  <circle cx="28" cy="28" r="7" fill="#60a5fa" />
  <circle cx="72" cy="72" r="7" fill="#60a5fa" />
  
  <!-- Chess Knight directly in the center -->
  <text x="50" y="68" font-size="48" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif">♞</text>
</svg>